<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Portfolio | Piyush Lakhera</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background-color: #0a0a0e;
            color: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        header h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        header p {
            color: #71717a;
            font-size: 16px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a1a1aa;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
        }
        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 50px;
        }
        .badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #e4e4e7;
            transition: all 0.3s ease;
        }
        .badge:hover {
            background: rgba(0, 242, 254, 0.05);
            border-color: #00f2fe;
            color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            transform: translateY(-2px);
        }
        .project-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .project-card h3 {
            font-size: 18px;
            color: #f4f4f5;
            margin-bottom: 10px;
        }
        .project-card p {
            color: #a1a1aa;
            font-size: 15px;
            line-height: 1.6;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: #71717a;
            text-decoration: none;
            font-size: 14px;
        }
        .back-btn:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Technical Portfolio</h1>
            <p>Computer Science & Internet of Things (CSIOT)</p>
        </header>

        <h2 class="section-title">Skills & Technologies</h2>
        <div class="skills-grid">
            <div class="badge">HTML5</div>
            <div class="badge">CSS3</div>
            <div class="badge">JavaScript</div>
            <div class="badge">Internet of Things (IoT)</div>
            <div class="badge">Git & GitHub</div>
        </div>

        <h2 class="section-title">Featured Projects</h2>
        <div class="project-card">
            <h3>Personal Developer Hub</h3>
            <p>A minimalist, high-performance developer portfolio built from scratch.</p>
        </div>

        <a href="index.html" class="back-btn">← Back to Main Hub</a>
    </div>

</body>
</html>
